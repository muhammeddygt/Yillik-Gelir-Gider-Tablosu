<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 Aylık Birikim ve Borç Ödeme Defteri</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<meta name="theme-color" content="#1C2541">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Birikim Defteri">

<style>
/* ===== Tokens ===== */
:root{
  --leather-1:#1C2541;
  --leather-2:#232C4F;
  --leather-3:#131A30;
  --paper:#FCFBF7;
  --paper-2:#F1EEE4;
  --rule:#E0DACB;
  --ink:#1E2A44;
  --ink-soft:#5C6B85;
  --red:#C0473F;
  --gold:#147D77;
  --gold-soft:#4FB8AC;
  --green:#2E9B57;
  --font-display:"Iowan Old Style","Palatino Linotype",Georgia,"Times New Roman",serif;
  --font-mono:"Courier New",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(ellipse at 50% -10%, #2E4470 0%, transparent 55%),
    repeating-linear-gradient(115deg, rgba(0,0,0,0.05) 0 2px, transparent 2px 6px),
    linear-gradient(160deg, var(--leather-2), var(--leather-3) 70%);
  color:var(--ink);
  font-family:var(--font-ui);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* faint desk vignette */
body::before{
  content:"";
  position:fixed; inset:0;
  background:radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 100%);
  pointer-events:none;
  z-index:5;
}

.stage{
  position:relative;
  width:min(94vw, 1040px);
  height:min(92vh, 1080px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  touch-action:pan-y;
}

/* ===== Book shell ===== */
.book{
  position:relative;
  width:100%;
  flex:1 1 auto;
  min-height:0;
  perspective:2600px;
}

/* stacked page-edge illusion, behind the active leaf */
.book-stack{
  position:absolute;
  inset:0;
  border-radius:3px 10px 10px 3px;
  background:var(--paper-2);
  box-shadow:
    2px 3px 0 0 #EBE7DA,
    5px 6px 0 0 #DFDAC7,
    8px 9px 0 0 #D3CDB6,
    11px 12px 14px 2px rgba(0,0,0,0.45);
  transform:translateZ(-2px);
}

.spine-shadow{
  position:absolute;
  left:0; top:0; bottom:0; width:46px;
  background:linear-gradient(90deg, rgba(0,0,0,0.32), transparent);
  z-index:20;
  pointer-events:none;
  border-radius:3px 0 0 3px;
}

/* ===== Page base (static, shows current/target content) ===== */
.page-base{
  position:absolute;
  inset:0;
  border-radius:3px 10px 10px 3px;
  overflow:hidden;
  box-shadow:0 18px 40px rgba(0,0,0,0.5);
}

/* ===== Flipper (animated leaf) ===== */
.flipper{
  position:absolute;
  inset:0;
  transform-style:preserve-3d;
  transform-origin:left center;
  z-index:10;
  pointer-events:none;
  opacity:0;
  transition:none;
}
.flipper.active{opacity:1; pointer-events:none;}
.flipper.animating{
  transition:transform 0.85s cubic-bezier(.4,.05,.2,1);
}

.face{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  border-radius:3px 10px 10px 3px;
  overflow:hidden;
  box-shadow:0 18px 40px rgba(0,0,0,0.5);
}
.face-back{transform:rotateY(180deg);}

/* shading overlay for depth while turning */
.face::after{
  content:"";
  position:absolute; inset:0;
  background:linear-gradient(90deg, rgba(0,0,0,0.35), transparent 35%, transparent 65%, rgba(0,0,0,0.12));
  opacity:0;
  transition:opacity .85s ease;
  pointer-events:none;
}
.flipper.animating .face::after{opacity:1;}

/* ===== Paper surface ===== */
.leaf{
  position:relative;
  width:100%; height:100%;
  background:
    repeating-linear-gradient(var(--paper) 0 30px, var(--rule) 30px 31px),
    var(--paper);
  padding:34px 30px 26px 54px;
  display:flex;
  flex-direction:column;
  gap:14px;
  font-family:var(--font-ui);
}
.leaf::before{ /* red ledger margin rule */
  content:"";
  position:absolute; left:34px; top:0; bottom:0; width:1px;
  background:rgba(165,67,58,0.35);
}
.leaf::after{ /* punch holes */
  content:"";
  position:absolute; left:14px; top:60px; bottom:60px; width:6px;
  background-image:radial-gradient(circle, rgba(0,0,0,0.18) 0 100%);
  background-repeat:repeat-y;
  background-size:6px 90px;
  background-position:0 0;
  opacity:0.5;
}

.leaf-scroll{
  overflow-y:auto;
  overflow-x:hidden;
  flex:1;
  padding-right:6px;
  min-height:0;
}
.leaf-scroll::-webkit-scrollbar{width:7px;}
.leaf-scroll::-webkit-scrollbar-thumb{background:var(--rule); border-radius:4px;}

/* ===== Page header ===== */
.eyebrow{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--red);
  font-weight:700;
}
.page-title{
  font-family:var(--font-display);
  font-size:26px;
  font-weight:700;
  color:var(--ink);
  margin:2px 0 0 0;
  letter-spacing:0.01em;
}
.page-sub{
  font-family:var(--font-ui);
  font-size:12px;
  color:var(--ink-soft);
  margin-top:2px;
}

.backup-row{
  display:flex; gap:8px; flex-wrap:wrap; margin:10px 0 2px;
}

/* ===== Hero stats (özet page) ===== */
.hero-row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:2px;
}
.hero-stat{
  background:rgba(27,54,93,0.05);
  border:1px solid rgba(27,54,93,0.12);
  border-radius:6px;
  padding:10px 12px;
}
.hero-label{
  font-size:10px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--ink-soft);
  font-weight:600;
}
.hero-value{
  font-family:var(--font-mono);
  font-size:19px;
  font-weight:700;
  color:var(--ink);
  margin-top:3px;
  font-variant-numeric:tabular-nums;
}
.hero-value.green{color:var(--green);}
.hero-note{font-size:10.5px; color:var(--ink-soft); margin-top:2px;}

/* ===== Tables ===== */
.section-label{
  font-family:var(--font-display);
  font-size:14px;
  font-weight:700;
  color:var(--ink);
  border-bottom:1px solid var(--rule);
  padding-bottom:4px;
  margin-top:4px;
  display:flex;
  align-items:baseline;
  justify-content:space-between;
}
.section-label small{
  font-family:var(--font-ui);
  font-weight:400;
  font-size:10px;
  color:var(--ink-soft);
}

table.ledger{
  border-collapse:collapse;
  width:100%;
  font-family:var(--font-mono);
  font-size:11.5px;
}
table.ledger th, table.ledger td{
  padding:5px 7px;
  text-align:right;
  white-space:nowrap;
}
table.ledger th:first-child, table.ledger td:first-child{
  text-align:left;
  font-family:var(--font-ui);
  position:sticky; left:0;
  background:var(--paper);
}
table.ledger thead th{
  font-family:var(--font-ui);
  font-size:9.5px;
  letter-spacing:0.03em;
  text-transform:uppercase;
  color:var(--ink-soft);
  border-bottom:1px solid var(--ink);
  padding-bottom:6px;
}
table.ledger tbody tr{border-bottom:1px solid var(--rule);}
table.ledger tbody tr:last-child{border-bottom:none;}
table.ledger tfoot td{
  border-top:2px solid var(--ink);
  font-weight:700;
  padding-top:7px;
}
.table-scroll{overflow-x:auto; padding-bottom:2px;}
.done{color:var(--green);}
.zero{color:#8B8B92;}

/* month page: item list */
.item-list{list-style:none; margin:0; padding:0; font-size:12.5px;}
.item-list li{
  display:flex; justify-content:space-between; align-items:baseline;
  padding:4px 0;
  border-bottom:1px dotted var(--rule);
  gap:10px;
}
.item-list li .label{font-family:var(--font-ui);}
.item-list li .label .sub{color:var(--ink-soft); font-size:10.5px; margin-left:5px;}
.item-list li .amt{font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-weight:600;}
.item-list li.total{border-bottom:none; border-top:1px solid var(--ink); font-weight:700; padding-top:6px; margin-top:2px;}

.two-col{display:grid; grid-template-columns:1fr 1fr; gap:22px;}

.totals-box{
  margin-top:auto;
  background:rgba(27,54,93,0.06);
  border:1px solid rgba(27,54,93,0.14);
  border-radius:6px;
  padding:12px 14px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}
.totals-box .t-label{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft);}
.totals-box .t-value{font-family:var(--font-mono); font-size:15px; font-weight:700; margin-top:2px; font-variant-numeric:tabular-nums;}

/* ===== Tabs (right side) ===== */
.tabs{
  position:absolute;
  right:-30px; top:14px; bottom:14px;
  display:flex;
  flex-direction:column;
  gap:3px;
  z-index:30;
}
.tab{
  writing-mode:vertical-rl;
  transform:rotate(180deg);
  background:linear-gradient(180deg, var(--gold-soft), var(--gold));
  color:#0B2A28;
  font-family:var(--font-display);
  font-size:11px;
  font-weight:700;
  letter-spacing:0.04em;
  border:none;
  border-radius:0 5px 5px 0;
  padding:7px 5px;
  cursor:pointer;
  flex:1;
  min-height:0;
  box-shadow:1px 1px 3px rgba(0,0,0,0.4);
  opacity:0.82;
  transition:opacity .2s, transform .2s, padding .2s;
}
.tab:hover{opacity:1; padding-right:8px;}
.tab.active{
  opacity:1;
  background:linear-gradient(180deg,#8FD8CB, var(--gold));
  padding-right:9px;
  box-shadow:2px 2px 5px rgba(0,0,0,0.5);
}

/* ===== Nav controls ===== */
.nav-controls{
  width:100%;
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  padding-top:18px;
  z-index:30;
}
.nav-btn{
  background:linear-gradient(180deg, var(--gold-soft), var(--gold));
  color:#0B2A28;
  border:none;
  width:46px; height:46px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 3px 8px rgba(0,0,0,0.5);
  display:flex; align-items:center; justify-content:center;
  transition:transform .15s;
}
.nav-btn:hover{transform:scale(1.08);}
.nav-btn:active{transform:scale(0.95);}
.nav-btn:disabled{opacity:0.3; cursor:default; transform:none;}
.page-indicator{
  font-family:var(--font-mono);
  color:var(--paper);
  font-size:12px;
  letter-spacing:0.05em;
  min-width:92px;
  text-align:center;
}

.corner-title{
  position:absolute;
  top:-38px; left:0;
  color:var(--gold-soft);
  font-family:var(--font-display);
  font-size:15px;
  letter-spacing:0.03em;
  opacity:0.85;
}

.install-btn{
  position:absolute; top:-43px; right:0; z-index:40;
  border:1px solid rgba(217,184,119,.65); border-radius:18px;
  padding:7px 12px; background:rgba(36,21,17,.82); color:var(--gold-soft);
  font:600 11px var(--font-ui); letter-spacing:.02em; cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.25); backdrop-filter:blur(8px);
}
.install-btn:hover{background:rgba(20,125,119,.18); border-color:var(--gold-soft);}
.install-btn[hidden]{display:none;}

.zoom-controls{
  position:absolute; top:-43px; left:0; z-index:40; display:flex; gap:6px;
}
.zoom-controls button{
  border:1px solid rgba(217,184,119,.65); border-radius:18px;
  padding:7px 11px; background:rgba(36,21,17,.82); color:var(--gold-soft);
  font:700 11px var(--font-ui); letter-spacing:.02em; cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.25); backdrop-filter:blur(8px);
}
.zoom-controls button:hover{background:rgba(20,125,119,.18); border-color:var(--gold-soft);}
.zoom-controls button:active{background:rgba(20,125,119,.3);}

@media (max-width:720px){
  .tabs{display:none;}
  .two-col{grid-template-columns:1fr;}
  .hero-row{grid-template-columns:1fr;}
  .leaf{padding:24px 18px 20px 34px;}
  .page-title{font-size:20px;}
}

@media (prefers-reduced-motion: reduce){
  .flipper.animating{transition:none;}
}

/* ===== v2 additions: salary card, editable rows, add/delete UI ===== */
.salary-card{
  background:rgba(47,93,80,0.06);
  border:1px solid rgba(47,93,80,0.22);
  border-radius:8px;
  padding:12px 14px;
  margin-bottom:4px;
}
.salary-card h3{
  font-family:var(--font-ui);
  font-size:10.5px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--green);
  margin:0 0 8px 0;
  display:flex; align-items:center; gap:8px;
}
.salary-card h3::after{
  content:'';flex:1;height:1px;
  background:repeating-linear-gradient(to right, var(--rule) 0 4px, transparent 4px 8px);
}
.salary-grid{display:grid; grid-template-columns:1fr 1fr; gap:6px 18px;}
.salary-row{display:flex; justify-content:space-between; align-items:center; padding:3px 0; gap:8px;}
.salary-row label{font-size:12px; color:var(--ink);}
.salary-row .hint{display:block; font-size:9.5px; color:var(--ink-soft); font-family:var(--font-mono);}
.num-input{
  width:96px; text-align:right;
  font-family:var(--font-mono); font-size:12.5px; color:var(--ink);
  background:#fff; border:1px solid var(--rule); border-radius:4px;
  padding:3px 6px;
}
.num-input:focus{outline:none; border-color:var(--gold);}
.stepper2{display:flex; align-items:center; gap:5px;}
.stepper2 button{
  width:24px;height:24px; border-radius:5px; border:1px solid rgba(47,93,80,.3);
  background:#fff; color:var(--green); font-family:var(--font-mono); font-size:14px;
  line-height:1; cursor:pointer;
}
.stepper2 input{width:42px; text-align:center; font-family:var(--font-mono); font-size:13px;
  border:1px solid rgba(47,93,80,.3); border-radius:5px; padding:3px 2px;}
.salary-total{
  display:flex; justify-content:space-between; align-items:baseline;
  margin-top:8px; padding-top:8px; border-top:1px solid rgba(47,93,80,.25);
}
.salary-total .lbl{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--green); font-weight:700;}
.salary-total .val{font-family:var(--font-mono); font-size:17px; font-weight:700; color:var(--green);}

/* editable ledger row */
.ed-row{
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  padding:4px 0; border-bottom:1px dotted var(--rule);
}
.ed-row .name-input{
  border:none; background:transparent; font-family:var(--font-ui); font-size:12.5px;
  color:var(--ink); flex:1; min-width:0; border-bottom:1px dashed transparent;
}
.ed-row .name-input:focus{outline:none; border-bottom:1px dashed var(--gold);}
.ed-row .meta{font-size:9.5px; color:var(--ink-soft); font-family:var(--font-mono); margin-left:4px;}
.ed-row .amt-input{width:92px;}
.ed-row .del-btn{
  border:none; background:transparent; color:var(--red); font-size:14px; cursor:pointer;
  width:20px; height:20px; line-height:1; opacity:0.55;
}
.ed-row .del-btn:hover{opacity:1;}
.ed-row.na{opacity:0.4; font-style:italic;}
.ed-row .hide-btn{
  border:none; background:transparent; font-size:13px; cursor:pointer;
  width:20px; height:20px; line-height:1; opacity:0.45; filter:grayscale(1);
}
.ed-row .hide-btn:hover{opacity:0.9;}

.paid-toggle{
  width:19px; height:19px; border-radius:50%; border:1.5px solid var(--rule);
  background:#fff; color:#fff; font-size:12px; font-weight:700; line-height:1;
  display:inline-flex; align-items:center; justify-content:center; padding:0;
  cursor:pointer; margin-right:5px; vertical-align:middle; flex:none;
}
.paid-toggle.on{background:var(--green); border-color:var(--green);}
.ed-row.debt-row.paid{background:rgba(63,107,76,.09); border-radius:8px;}

td.paid-cell{background:rgba(63,107,76,.16);}
td.paid-cell .table-edit{border-color:var(--green);}

.hide-btn{
  border:none; background:transparent; cursor:pointer; font-size:12px;
  opacity:0.4; filter:grayscale(1); vertical-align:middle; margin-left:4px;
}
.hide-btn:hover{opacity:0.9;}

.hidden-panel{
  margin-top:10px; font-family:var(--font-ui); font-size:10.5px; color:var(--ink-soft);
  line-height:1.9;
}
.hidden-panel .show-btn{
  border:1px solid var(--rule); border-radius:12px; background:#fff;
  padding:2px 8px; font-size:9.5px; cursor:pointer; margin-left:3px; color:var(--ink);
}

/* ===== groups, reordering, missed-payment, progress ===== */
.group-header{
  font:700 10.5px var(--font-ui); text-transform:uppercase; letter-spacing:.08em;
  color:var(--gold); margin:16px 0 6px; padding-bottom:5px; border-bottom:1px solid var(--rule);
}
.group-header-row td{
  background:rgba(20,125,119,.13); font:700 10px var(--font-ui); text-transform:uppercase;
  letter-spacing:.08em; color:var(--gold); padding:6px 10px !important;
}
.move-btns{display:inline-flex; flex-direction:column; gap:1px; vertical-align:middle; margin-right:4px;}
.move-btn{
  border:1px solid var(--rule); background:#fff; border-radius:4px; width:16px; height:13px;
  font-size:8px; line-height:1; cursor:pointer; padding:0; color:var(--ink-soft);
}
.move-btn:hover{color:var(--gold); border-color:var(--gold);}

.status-toggles{display:inline-flex; gap:2px; vertical-align:middle; margin-right:4px;}
.missed-toggle{
  width:19px; height:19px; border-radius:50%; border:1.5px solid var(--rule);
  background:#fff; color:#fff; font-size:11px; font-weight:700; line-height:1;
  display:inline-flex; align-items:center; justify-content:center; padding:0;
  cursor:pointer; vertical-align:middle; flex:none;
}
.missed-toggle.on{background:#9a3b3b; border-color:#9a3b3b;}
.ed-row.debt-row.missed{background:rgba(154,59,59,.09); border-radius:8px;}
td.missed-cell{background:rgba(154,59,59,.16);}
td.missed-cell .table-edit{border-color:#9a3b3b;}

.progress-row{margin:4px 0 2px;}
.progress-track{width:100%; height:5px; background:var(--paper-2); border-radius:3px; overflow:hidden;}
.progress-fill{height:100%; background:linear-gradient(90deg,var(--gold-soft),var(--green)); border-radius:3px;}
.progress-pct{display:block; font-size:9px; color:var(--ink-soft); font-family:var(--font-mono); margin-top:2px;}

.gold-block{margin-bottom:12px;}
.gold-block-head{
  display:flex; justify-content:space-between; font:700 12px var(--font-ui);
  color:var(--ink); padding:4px 0; border-bottom:1px solid var(--rule); margin-bottom:2px;
}
.gold-row{padding:6px 0;}
.gold-amt{font-family:var(--font-mono); font-size:13px; min-width:70px; display:inline-block;}
.gold-month{font-size:11px; color:var(--ink-soft); flex:1;}
.empty-note{font-size:11px; color:var(--ink-soft); font-style:italic; padding:6px 0;}
.summary-note{font-size:10.5px; color:var(--ink-soft); margin:2px 0 8px;}

.add-btn{
  display:inline-flex; align-items:center; gap:5px;
  border:1px dashed var(--gold);
  background:transparent; color:var(--gold);
  font-family:var(--font-ui); font-size:11px; font-weight:600;
  border-radius:14px; padding:4px 10px; cursor:pointer; margin-top:6px;
}
.add-btn:hover{background:rgba(20,125,119,0.1);}

.add-form{
  background:rgba(20,125,119,0.08);
  border:1px solid rgba(20,125,119,0.35);
  border-radius:8px;
  padding:10px 12px;
  margin-top:6px;
  display:flex; flex-direction:column; gap:6px;
}
.add-form .fr{display:flex; align-items:center; gap:8px; justify-content:space-between;}
.add-form label{font-size:11px; color:var(--ink-soft); min-width:110px;}
.add-form select, .add-form input[type=text], .add-form input[type=number]{
  font-family:var(--font-ui); font-size:12px; padding:4px 6px; border:1px solid var(--rule);
  border-radius:4px; background:#fff; flex:1;
}

  <div class="stage">

<script>
(function(){
  "use strict";

  var MONTHS = ['Ağustos','Eylül','Ekim','Kasım','Aralık','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz'];
  var MONTH_ABBR = {'Ağustos':'Ağu','Eylül':'Eyl','Ekim':'Eki','Kasım':'Kas','Aralık':'Ara','Ocak':'Oca','Şubat':'Şub','Mart':'Mar','Nisan':'Nis','Mayıs':'May','Haziran':'Haz','Temmuz':'Tem'};
  var STORAGE_KEY = 'birikimDefteri_v2';
  var uidCounter = 1;
  function uid(){ return 'id' + (uidCounter++) + '_' + Math.random().toString(36).slice(2,7); }

  // ---------------- default seed (continuity with the previous plan) ----------------
  function defaultState(){
    return {
      salaryFixed:{netMaas:69772, sendika:5814, aile:2095, pazarRate:3488, mesaiRate:465},
      salaryMonthly: MONTHS.reduce(function(acc,m){ acc[m]={pazarGun:0, mesaiSaat:0}; return acc; },{}),
      borsaOran: MONTHS.map(function(){return 3.1;}),
      expenses:[ {id:uid(), ad:'Kira', tutar:15000} ],
      offBudgetExpenses:MONTHS.map(function(){return [];}),
      gold:{ayar24:[], ayar22:[]},
      faturalar:[
        {id:uid(), ad:'Aidat', tutar:2200, monthlyAmounts:MONTHS.map(function(){return 2200;}), cardTransfers:{}},
        {id:uid(), ad:'Telefon', tutar:4000, monthlyAmounts:MONTHS.map(function(m,i){return i===0?8750:4000;}), cardTransfers:{}},
        {id:uid(), ad:'Merve', tutar:1700, monthlyAmounts:MONTHS.map(function(){return 1700;}), cardTransfers:{}},
        {id:uid(), ad:'İnternet', tutar:1250, monthlyAmounts:MONTHS.map(function(){return 1250;}), cardTransfers:{}},
        {id:uid(), ad:'Seyfo', tutar:700, monthlyAmounts:MONTHS.map(function(){return 700;}), cardTransfers:{}},
        {id:uid(), ad:'Elektrik Su Doğalgaz', tutar:1000, monthlyAmounts:MONTHS.map(function(){return 1000;}), cardTransfers:{}}
      ],
      debts:[
        {id:uid(), ad:'Annem', tur:'manuel', baslangic:15000, startMonthIndex:0,
          payments:{0:2000,1:2000,2:2000,3:2000,4:2000,5:2000,6:2000,7:1000}, balanceOverrides:{}, additions:{}},
        {id:uid(), ad:'Garanti Kredi', tur:'kredi', baslangic:52500, startMonthIndex:0, taksit:7500, payments:{}},
        {id:uid(), ad:'Ziraat Kredi Kartı', tur:'kredi_karti', baslangic:50000, startMonthIndex:0, asgariYuzde:20, faizYuzde:5, payments:{}},
        {id:uid(), ad:'Garanti Kredi Kartı', tur:'kredi_karti', baslangic:5177, startMonthIndex:0, asgariYuzde:20, faizYuzde:5, payments:{}},
        {id:uid(), ad:'Nursena Kredi Kartı', tur:'kredi_karti', baslangic:20000, startMonthIndex:0, asgariYuzde:20, faizYuzde:5, payments:{}},
        {id:uid(), ad:'Ömer Kredi', tur:'kredi', baslangic:16400, startMonthIndex:0, taksit:4100, payments:{}},
        {id:uid(), ad:'Ömer PC', tur:'kredi', baslangic:18800, startMonthIndex:0, taksit:2350, payments:{}},
        {id:uid(), ad:'Ömer Gözlük', tur:'kredi', baslangic:4500, startMonthIndex:0, taksit:4500, payments:{}},
        {id:uid(), ad:'Hadi', tur:'kredi', baslangic:1000, startMonthIndex:0, taksit:1000, payments:{}}
      ],
      ekBorclular:[
        {id:uid(), ad:'Gül Yenge', baslangic:24000, startMonthIndex:0, payments:{}},
        {id:uid(), ad:'Esme Teyze', baslangic:10500, startMonthIndex:0, payments:{}},
        {id:uid(), ad:'Avukat', baslangic:30000, startMonthIndex:0, payments:{}},
        {id:uid(), ad:'Kyk', baslangic:8500, startMonthIndex:0, payments:{}},
        {id:uid(), ad:'Yunus', baslangic:8000, startMonthIndex:0, payments:{}},
        {id:uid(), ad:'Sedat', baslangic:1500, startMonthIndex:0, payments:{}}
      ]
    };
  }

  function load(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return normalizeState(defaultState());
      var parsed = JSON.parse(raw);
      return normalizeState(parsed);
    }catch(e){ return normalizeState(defaultState()); }
  }

  // Eski v2 kayıtlarını veri kaybı olmadan aylık v3 yapısına taşır.
  function normalizeState(parsed){
    var def = defaultState();
    var out = Object.assign({}, def, parsed || {});
    out.salaryFixed = Object.assign({}, def.salaryFixed, (parsed && parsed.salaryFixed) || {});
    out.salaryMonthly = Object.assign({}, def.salaryMonthly, (parsed && parsed.salaryMonthly) || {});
    MONTHS.forEach(function(m){
      out.salaryMonthly[m] = Object.assign({pazarGun:0, mesaiSaat:0}, out.salaryMonthly[m] || {});
    });
    out.borsaOran = Array.isArray(out.borsaOran) ? out.borsaOran.slice(0,12) : def.borsaOran.slice();
    while(out.borsaOran.length < 12) out.borsaOran.push(3.1);
    out.expenses = Array.isArray(out.expenses) ? out.expenses : def.expenses;
    out.offBudgetExpenses = Array.isArray(out.offBudgetExpenses) ? out.offBudgetExpenses.slice(0,12) : def.offBudgetExpenses;
    while(out.offBudgetExpenses.length < 12) out.offBudgetExpenses.push([]);
    out.offBudgetExpenses = out.offBudgetExpenses.map(function(monthItems){
      return (Array.isArray(monthItems) ? monthItems : []).map(function(item){
        return {id:item.id || uid(), ad:item.ad || 'Yeni Harcama', tutar:Number(item.tutar || 0)};
      });
    });
    out.faturalar = (Array.isArray(out.faturalar) ? out.faturalar : def.faturalar).map(function(f){
      var oldAmount = Number(f.tutar || 0);
      var amounts = Array.isArray(f.monthlyAmounts) ? f.monthlyAmounts.slice(0,12) : MONTHS.map(function(){return oldAmount;});
      while(amounts.length < 12) amounts.push(oldAmount);
      return Object.assign({}, f, {monthlyAmounts:amounts.map(function(v){return Number(v || 0);}), cardTransfers:f.cardTransfers || {}});
    });
    out.debts = (Array.isArray(out.debts) ? out.debts : def.debts).map(function(d,idx){
      return Object.assign({}, d, {
        payments:d.payments || {}, balanceOverrides:d.balanceOverrides || {}, additions:d.additions || {},
        paidMonths:d.paidMonths || {}, missedMonths:d.missedMonths || {}, hidden: !!d.hidden,
        sortOrder: (typeof d.sortOrder === 'number') ? d.sortOrder : idx,
        startMonthIndex:Math.max(0, Number(d.startMonthIndex || 0))
      });
    });
    out.ekBorclular = (Array.isArray(out.ekBorclular) ? out.ekBorclular : def.ekBorclular).map(function(d,idx){
      return Object.assign({}, d, {
        payments:d.payments || {}, balanceOverrides:d.balanceOverrides || {}, additions:d.additions || {},
        paidMonths:d.paidMonths || {}, missedMonths:d.missedMonths || {}, hidden: !!d.hidden,
        sortOrder: (typeof d.sortOrder === 'number') ? d.sortOrder : idx,
        startMonthIndex:Math.max(0, Number(d.startMonthIndex || 0))
      });
    });
    out.gold = (out.gold && typeof out.gold === 'object') ? out.gold : {ayar24:[], ayar22:[]};
    ['ayar24','ayar22'].forEach(function(k){
      out.gold[k] = (Array.isArray(out.gold[k]) ? out.gold[k] : []).map(function(g){
        return {id:g.id || uid(), gram:Number(g.gram || 0), mi:Math.max(0, Math.min(11, Number(g.mi || 0)))};
      });
    });
    return out;
  }
  function save(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); }catch(e){}
  }

  var STATE = load();

  // ---------------- number helpers ----------------
  function parseNum(str){
    if(str === null || str === undefined) return 0;
    str = String(str).trim();
    if(str === '') return 0;
    str = str.replace(/\./g,'').replace(',', '.');
    var v = parseFloat(str);
    return isNaN(v) ? 0 : v;
  }
  function fmt(n){
    if(n === null || n === undefined) return '—';
    var num = Number(n);
    if(isNaN(num)) return '—';
    return num.toLocaleString('tr-TR',{minimumFractionDigits:2, maximumFractionDigits:2}) + ' TL';
  }
  function fmtShort(n){
    if(n === null || n === undefined) return '—';
    var num = Number(n);
    if(isNaN(num)) return '—';
    return num.toLocaleString('tr-TR',{maximumFractionDigits:0}) + ' TL';
  }
  function editVal(n){
    if(n === null || n === undefined) return '';
    return Number(n).toLocaleString('tr-TR',{minimumFractionDigits:2, maximumFractionDigits:2});
  }

  function hasOwn(obj, key){ return Object.prototype.hasOwnProperty.call(obj || {}, key); }
  function billAmountForMonth(f, i){
    if(Array.isArray(f.monthlyAmounts)) return Number(f.monthlyAmounts[i] || 0);
    return Number(f.tutar || 0);
  }
  function billTotalForMonth(i){
    return STATE.faturalar.reduce(function(s,f){ return s + billAmountForMonth(f,i); },0);
  }
  function offBudgetTotalForMonth(i){
    var items = STATE.offBudgetExpenses[i] || [];
    return items.reduce(function(s,item){return s + Number(item.tutar || 0);},0);
  }
  function transferredBillsForCard(cardId, targetMonth){
    return STATE.faturalar.reduce(function(total,f){
      var transfers = f.cardTransfers || {};
      return total + Object.keys(transfers).reduce(function(sub,key){
        var tr = transfers[key];
        return sub + (tr && tr.cardId===cardId && Number(tr.targetMonth)===targetMonth ? Number(tr.amount||0) : 0);
      },0);
    },0);
  }
  function additionsForDebt(d, i){
    return Number((d.additions && d.additions[i]) || 0) + transferredBillsForCard(d.id, i);
  }

  // ---------------- calculation engine ----------------
  function calcDebtSeries(d){
    var balances = new Array(12).fill(null);
    var paid = new Array(12).fill(null);
    var suggested = new Array(12).fill(null);
    var bal = Number(d.baslangic || 0);
    for(var i=0;i<12;i++){
      if(i < d.startMonthIndex){ continue; }
      bal += additionsForDebt(d, i);
      var payment, sugg;
      if(d.tur === 'kredi_karti'){
        var faizli = bal * (1 + (Number(d.faizYuzde||0)/100));
        sugg = bal * ((Number(d.asgariYuzde||0) + Number(d.faizYuzde||0))/100);
        payment = (d.payments[i] !== undefined) ? d.payments[i] : sugg;
        bal = Math.max(0, faizli - payment);
      } else if(d.tur === 'kmh'){
        var faizliKmh = bal * (1 + (Number(d.faizYuzde||0)/100));
        sugg = bal * (Number(d.faizYuzde||0)/100); // faiz-only suggested payment; principal stays flat unless you pay more
        payment = (d.payments[i] !== undefined) ? d.payments[i] : sugg;
        bal = Math.max(0, faizliKmh - payment);
      } else if(d.tur === 'kredi'){
        sugg = Math.min(Number(d.taksit||0), bal);
        payment = (d.payments[i] !== undefined) ? d.payments[i] : sugg;
        bal = Math.max(0, bal - payment);
      } else { // manuel
        sugg = 0;
        payment = (d.payments[i] !== undefined) ? d.payments[i] : 0;
        bal = Math.max(0, bal - payment);
      }
      if(hasOwn(d.balanceOverrides, i)) bal = Math.max(0, Number(d.balanceOverrides[i] || 0));
      balances[i] = bal;
      paid[i] = payment;
      suggested[i] = sugg;
    }
    return {balances:balances, paid:paid, suggested:suggested};
  }

  function calcEkSeries(d){
    var balances = new Array(12).fill(null);
    var paid = new Array(12).fill(null);
    var bal = Number(d.baslangic || 0);
    for(var i=0;i<12;i++){
      if(i < d.startMonthIndex){ continue; }
      bal += Number((d.additions && d.additions[i]) || 0);
      var payment = (d.payments[i] !== undefined) ? d.payments[i] : 0;
      bal = Math.max(0, bal - payment);
      if(hasOwn(d.balanceOverrides, i)) bal = Math.max(0, Number(d.balanceOverrides[i] || 0));
      balances[i] = bal;
      paid[i] = payment;
    }
    return {balances:balances, paid:paid};
  }

  function salaryForMonth(i){
    var f = STATE.salaryFixed;
    var v = STATE.salaryMonthly[MONTHS[i]] || {pazarGun:0, mesaiSaat:0};
    var pazarUcret = v.pazarGun * f.pazarRate;
    var mesaiUcret = v.mesaiSaat * f.mesaiRate;
    var toplam = f.netMaas + f.sendika + f.aile + pazarUcret + mesaiUcret;
    return {pazarUcret:pazarUcret, mesaiUcret:mesaiUcret, toplam:toplam};
  }

  function monthTotals(i){
    var gelir = salaryForMonth(i).toplam;
    var expTotal = STATE.expenses.reduce(function(s,e){return s+Number(e.tutar||0);},0);
    var offBudgetTotal = offBudgetTotalForMonth(i);
    var faturaTotal = billTotalForMonth(i);
    var debtPaidTotal = STATE.debts.reduce(function(s,d){
      if(i < d.startMonthIndex) return s;
      var ser = calcDebtSeries(d);
      return s + (ser.paid[i]||0);
    },0);
    var ekPaidTotal = STATE.ekBorclular.reduce(function(s,d){
      if(i < d.startMonthIndex) return s;
      var ser = calcEkSeries(d);
      return s + (ser.paid[i]||0);
    },0);
    var toplamGider = expTotal + offBudgetTotal + faturaTotal + debtPaidTotal + ekPaidTotal;
    var netKalan = gelir - toplamGider;
    var ekKalanToplam = STATE.ekBorclular.reduce(function(s,d){
      if(i < d.startMonthIndex) return s;
      var ser = calcEkSeries(d);
      return s + (ser.balances[i]||0);
    },0);
    return {
      gelir:gelir, toplamGider:toplamGider, netKalan:netKalan,
      sabitGiderTotal:expTotal, offBudgetTotal:offBudgetTotal, faturaTotal:faturaTotal,
      debtPaidTotal:debtPaidTotal, ekPaidTotal:ekPaidTotal, toplamBorcOdemesi:debtPaidTotal+ekPaidTotal,
      ekKalanToplam:ekKalanToplam
    };
  }

  function borsaSeries(){
    var cum = 0, out = [];
    for(var i=0;i<12;i++){
      var net = monthTotals(i).netKalan;
      var oran = (STATE.borsaOran[i]||0)/100;
      cum = (i===0) ? net : cum*(1+oran) + net;
      out.push(cum);
    }
    return out;
  }

  var GROUP_ORDER = ['kredi_karti','kmh','kredi','manuel'];
  var GROUP_LABELS = {kredi_karti:'Kredi Kartları', kmh:'KMH Hesapları', kredi:'Krediler (Sabit Taksit)', manuel:'Manuel Takip'};

  function sortedVisibleDebts(){
    return STATE.debts.filter(function(d){return !d.hidden;}).sort(function(a,b){
      var ga = GROUP_ORDER.indexOf(a.tur); if(ga===-1) ga = GROUP_ORDER.length;
      var gb = GROUP_ORDER.indexOf(b.tur); if(gb===-1) gb = GROUP_ORDER.length;
      if(ga!==gb) return ga-gb;
      return (a.sortOrder||0)-(b.sortOrder||0);
    });
  }
  function sortedVisibleEk(){
    return STATE.ekBorclular.filter(function(d){return !d.hidden;}).sort(function(a,b){
      return (a.sortOrder||0)-(b.sortOrder||0);
    });
  }
  function moveItem(listName, id, dir){
    var list = findList(listName);
    var groupKeyFn = (listName==='debts') ? function(x){return x.tur;} : function(){return '_all';};
    var item = list.filter(function(x){return x.id===id;})[0];
    if(!item) return;
    var gk = groupKeyFn(item);
    var siblings = list.filter(function(x){return groupKeyFn(x)===gk;}).sort(function(a,b){return (a.sortOrder||0)-(b.sortOrder||0);});
    var idx = siblings.findIndex(function(x){return x.id===id;});
    var swapIdx = idx+dir;
    if(swapIdx<0 || swapIdx>=siblings.length) return;
    var tmp = siblings[idx].sortOrder;
    siblings[idx].sortOrder = siblings[swapIdx].sortOrder;
    siblings[swapIdx].sortOrder = tmp;
    save(); rerenderCurrent();
  }

  function gramFmt(n){
    if(n === null || n === undefined) return '0';
    var num = Number(n);
    if(isNaN(num)) return '0';
    return num.toLocaleString('tr-TR',{maximumFractionDigits:2});
  }

  function goldSectionHtml(){
    function block(key, label){
      var arr = STATE.gold[key].slice().sort(function(a,b){return a.mi-b.mi;});
      var total = arr.reduce(function(s,g){return s+g.gram;},0);
      var rows = arr.map(function(g){
        return '<div class="ed-row gold-row"><span class="gold-amt">'+gramFmt(g.gram)+' gr</span>'+
          '<span class="gold-month">'+MONTHS[g.mi]+'</span>'+
          '<button class="del-btn" data-list="gold-'+key+'" data-id="'+g.id+'" data-action="del">✕</button></div>';
      }).join('') || '<div class="empty-note">Henüz '+label+' girişi yok.</div>';
      return '<div class="gold-block">'+
        '<div class="gold-block-head"><strong>'+label+'</strong><span>'+gramFmt(total)+' gr</span></div>'+
        rows+
      '</div>';
    }
    return block('ayar24','24 Ayar') + block('ayar22','22 Ayar');
  }

  // ---------------- DOM wiring ----------------
  var pageBase = document.getElementById('pageBase');
  var flipper = document.getElementById('flipper');
  var faceFront = flipper.querySelector('.face-front .leaf');
  var faceBack = flipper.querySelector('.face-back .leaf');
  var baseLeaf = pageBase.querySelector('.leaf');
  var indicator = document.getElementById('pageIndicator');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  var tabsEl = document.getElementById('tabs');
  var current = 0;
  var animating = false;

  function buildTabs(){
    var labels = ['Özet'].concat(MONTHS.map(function(m){return MONTH_ABBR[m];}));
    labels.forEach(function(label, i){
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'tab' + (i===0 ? ' active' : '');
      b.textContent = label;
      b.setAttribute('aria-label', i===0 ? 'Genel Özeti aç' : MONTHS[i-1]+' sayfasını aç');
      b.addEventListener('click', function(){ goTo(i); });
      tabsEl.appendChild(b);
    });
  }
  function updateTabs(){
    var tabs = tabsEl.querySelectorAll('.tab');
    tabs.forEach(function(t,i){
      t.classList.toggle('active', i===current);
      if(i===current) t.setAttribute('aria-current','page'); else t.removeAttribute('aria-current');
    });
  }
  function updateIndicator(){
    indicator.textContent = (current===0?'Özet':MONTH_ABBR[MONTHS[current-1]]) + ' · ' + (current+1) + ' / ' + pageCount();
    prevBtn.disabled = (current===0);
    nextBtn.disabled = (current===pageCount()-1);
  }

  function captureFocusState(){
    var el = document.activeElement;
    if(!el || !baseLeaf.contains(el) || !el.dataset || !el.dataset.action) return null;
    return {
      action: el.dataset.action, id: el.dataset.id || null,
      mi: (el.dataset.mi !== undefined) ? el.dataset.mi : null,
      field: el.dataset.field || null,
      selStart: (typeof el.selectionStart === 'number') ? el.selectionStart : null,
      selEnd: (typeof el.selectionEnd === 'number') ? el.selectionEnd : null
    };
  }
  function restoreFocusState(state){
    if(!state) return;
    var sel = '[data-action="'+state.action+'"]';
    if(state.id) sel += '[data-id="'+state.id+'"]';
    if(state.mi !== null) sel += '[data-mi="'+state.mi+'"]';
    if(state.field) sel += '[data-field="'+state.field+'"]';
    var el = baseLeaf.querySelector(sel);
    if(!el) return;
    el.focus();
    if(state.selStart !== null && typeof el.setSelectionRange === 'function'){
      try{ el.setSelectionRange(state.selStart, state.selEnd); }catch(err){}
    }
  }

  function rerenderCurrent(){
    var scroller = baseLeaf.querySelector('.leaf-scroll');
    var scrollTop = scroller ? scroller.scrollTop : 0;
    var scrollLeftMap = [];
    if(scroller){
      scroller.querySelectorAll('.table-scroll').forEach(function(ts,idx){ scrollLeftMap[idx] = ts.scrollLeft; });
    }
    var focusState = captureFocusState();
    baseLeaf.innerHTML = renderPage(current);
    var newScroller = baseLeaf.querySelector('.leaf-scroll');
    if(newScroller){
      newScroller.scrollTop = scrollTop;
      newScroller.querySelectorAll('.table-scroll').forEach(function(ts,idx){ if(scrollLeftMap[idx]!==undefined) ts.scrollLeft = scrollLeftMap[idx]; });
    }
    restoreFocusState(focusState);
  }

  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function goTo(target){
    if(animating || target === current || target < 0 || target >= pageCount()) return;
    var dir = target > current ? 'next' : 'prev';
    animating = true;
    baseLeaf.innerHTML = renderPage(target);

    if(reduceMotion){
      current = target;
      updateIndicator(); updateTabs(); animating = false;
      return;
    }
    flipper.classList.remove('animating');
    flipper.style.transition = 'none';
    if(dir === 'next'){
      faceFront.innerHTML = renderPage(current);
      faceBack.innerHTML = renderPage(target);
      flipper.style.transform = 'rotateY(0deg)';
    } else {
      faceFront.innerHTML = renderPage(target);
      faceBack.innerHTML = renderPage(current);
      flipper.style.transform = 'rotateY(-180deg)';
    }
    flipper.classList.add('active');
    void flipper.offsetWidth;
    flipper.classList.add('animating');
    flipper.style.transition = '';
    requestAnimationFrame(function(){
      flipper.style.transform = (dir === 'next') ? 'rotateY(-180deg)' : 'rotateY(0deg)';
    });
    var done = function(){
      flipper.removeEventListener('transitionend', done);
      flipper.classList.remove('active','animating');
      current = target;
      updateIndicator(); updateTabs();
      animating = false;
    };
    flipper.addEventListener('transitionend', done);
    setTimeout(function(){ if(animating) done(); }, 1100);
  }

  prevBtn.addEventListener('click', function(){ goTo(current-1); });
  nextBtn.addEventListener('click', function(){ goTo(current+1); });

  // ---------------- delegated event handling on the settled page ----------------
  function findList(name){
    if(name === 'gold-ayar24') return STATE.gold.ayar24;
    if(name === 'gold-ayar22') return STATE.gold.ayar22;
    return STATE[name];
  }

  function onChange(e){
    var t = e.target;
    var action = t.dataset.action;
    if(!action) return;

    if(action === 'import-file'){
      var file = t.files && t.files[0];
      if(!file) return;
      var reader = new FileReader();
      reader.onload = function(ev){
        try{
          var parsed = JSON.parse(ev.target.result);
          STATE = normalizeState(parsed);
          save();
          rerenderCurrent();
          window.alert('Yedek başarıyla geri yüklendi.');
        }catch(err){
          window.alert('Dosya okunamadı. Lütfen bu uygulamadan alınmış bir yedek (.json) dosyası seçin.');
        }
      };
      reader.readAsText(file);
      t.value = '';
      return;
    }

    if(action === 'fixed'){
      if(String(t.value).trim()===''){ rerenderCurrent(); return; }
      STATE.salaryFixed[t.dataset.field] = parseNum(t.value);
      save(); rerenderCurrent(); return;
    }
    if(action === 'monthly'){
      var mi = current - 1;
      if(mi < 0) return;
      if(String(t.value).trim()===''){ rerenderCurrent(); return; }
      STATE.salaryMonthly[MONTHS[mi]][t.dataset.field] = Math.max(0, Math.round(parseNum(t.value)));
      save(); rerenderCurrent(); return;
    }
    if(action === 'borsa-oran'){
      if(String(t.value).trim()===''){ rerenderCurrent(); return; }
      var idx = parseInt(t.dataset.i,10);
      STATE.borsaOran[idx] = parseNum(t.value);
      save(); rerenderCurrent(); return;
    }
    if(action === 'name'){
      var list = findList(t.dataset.list);
      var item = list.filter(function(x){return x.id===t.dataset.id;})[0];
      if(item){ item.ad = t.value; save(); }
      return; // no full rerender needed, avoids focus loss on name edits
    }
    if(action === 'amt'){
      if(String(t.value).trim()===''){ rerenderCurrent(); return; }
      var list2 = findList(t.dataset.list);
      var item2 = list2.filter(function(x){return x.id===t.dataset.id;})[0];
      if(item2){ item2.tutar = parseNum(t.value); save(); rerenderCurrent(); }
      return;
    }
    if(action === 'offbudget-name' || action === 'offbudget-amt'){
      if(action === 'offbudget-amt' && String(t.value).trim()===''){ rerenderCurrent(); return; }
      var offMi = parseInt(t.dataset.mi,10);
      var offList = STATE.offBudgetExpenses[offMi] || [];
      var offItem = offList.filter(function(x){return x.id===t.dataset.id;})[0];
      if(offItem){
        if(action === 'offbudget-name') offItem.ad = t.value;
        else offItem.tutar = Math.max(0,parseNum(t.value));
        save();
        if(action === 'offbudget-amt') rerenderCurrent();
      }
      return;
    }
    if(action === 'bill-amt'){
      if(String(t.value).trim()===''){ rerenderCurrent(); return; }
      var bill = STATE.faturalar.filter(function(x){return x.id===t.dataset.id;})[0];
      var billMi = parseInt(t.dataset.mi,10);
      if(bill){
        if(!Array.isArray(bill.monthlyAmounts)) bill.monthlyAmounts = MONTHS.map(function(){return Number(bill.tutar||0);});
        bill.monthlyAmounts[billMi] = Math.max(0, parseNum(t.value));
        save(); rerenderCurrent();
      }
      return;
    }
    if(action === 'principal'){
      if(String(t.value).trim()===''){ rerenderCurrent(); return; }
      var principalList = findList(t.dataset.list);
      var principalItem = principalList.filter(function(x){return x.id===t.dataset.id;})[0];
      if(principalItem){ principalItem.baslangic = Math.max(0, parseNum(t.value)); save(); rerenderCurrent(); }
      return;
    }
    if(action === 'balance'){
      var balanceList = findList(t.dataset.list);
      var balanceItem = balanceList.filter(function(x){return x.id===t.dataset.id;})[0];
      var balanceMi = parseInt(t.dataset.mi,10);
      if(balanceItem){
        balanceItem.balanceOverrides = balanceItem.balanceOverrides || {};
        if(String(t.value).trim()==='') delete balanceItem.balanceOverrides[balanceMi];
        else balanceItem.balanceOverrides[balanceMi] = Math.max(0, parseNum(t.value));
        save(); rerenderCurrent();
      }
      return;
    }
    if(action === 'pay'){
      var list3 = findList(t.dataset.list);
      var item3 = list3.filter(function(x){return x.id===t.dataset.id;})[0];
      var mi3 = parseInt(t.dataset.mi,10);
      if(item3){
        if(String(t.value).trim()===''){ delete item3.payments[mi3]; } // blank = go back to automatic/suggested payment
        else item3.payments[mi3] = parseNum(t.value);
        save(); rerenderCurrent();
      }
      return;
    }
    if(action === 'kk-rate'){
      if(String(t.value).trim()===''){ rerenderCurrent(); return; }
      var list9 = findList(t.dataset.list);
      var item9 = list9.filter(function(x){return x.id===t.dataset.id;})[0];
      if(item9){ item9[t.dataset.field] = Math.max(0, parseNum(t.value)); save(); rerenderCurrent(); }
      return;
    }
  }

  function onClick(e){
    var t = e.target;
    var action = t.dataset.action;
    if(!action) return;

    if(action === 'export-data'){
      var blob = new Blob([JSON.stringify(STATE, null, 2)], {type:'application/json'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      var stamp = new Date().toISOString().slice(0,10);
      a.href = url; a.download = 'birikim-defteri-yedek-'+stamp+'.json';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
      return;
    }

    if(action === 'toggle-paid'){
      var listP = findList(t.dataset.list);
      var itemP = listP.filter(function(x){return x.id===t.dataset.id;})[0];
      var miP = parseInt(t.dataset.mi,10);
      if(itemP){
        itemP.paidMonths = itemP.paidMonths || {};
        itemP.missedMonths = itemP.missedMonths || {};
        if(itemP.paidMonths[miP]) delete itemP.paidMonths[miP];
        else { itemP.paidMonths[miP] = true; delete itemP.missedMonths[miP]; }
        save(); rerenderCurrent();
      }
      return;
    }
    if(action === 'toggle-missed'){
      var listMs = findList(t.dataset.list);
      var itemMs = listMs.filter(function(x){return x.id===t.dataset.id;})[0];
      var miMs = parseInt(t.dataset.mi,10);
      if(itemMs){
        itemMs.missedMonths = itemMs.missedMonths || {};
        itemMs.paidMonths = itemMs.paidMonths || {};
        if(itemMs.missedMonths[miMs]) delete itemMs.missedMonths[miMs];
        else { itemMs.missedMonths[miMs] = true; delete itemMs.paidMonths[miMs]; }
        save(); rerenderCurrent();
      }
      return;
    }
    if(action === 'move-up'){ moveItem(t.dataset.list, t.dataset.id, -1); return; }
    if(action === 'move-down'){ moveItem(t.dataset.list, t.dataset.id, 1); return; }
    if(action === 'hide-item'){
      var listH = findList(t.dataset.list);
      var itemH = listH.filter(function(x){return x.id===t.dataset.id;})[0];
      if(itemH){ itemH.hidden = true; save(); rerenderCurrent(); }
      return;
    }
    if(action === 'show-item'){
      var listS = findList(t.dataset.list);
      var itemS = listS.filter(function(x){return x.id===t.dataset.id;})[0];
      if(itemS){ itemS.hidden = false; save(); rerenderCurrent(); }
      return;
    }

    if(action === 'step'){
      var mi = current - 1;
      if(mi < 0) return;
      var field = t.dataset.field;
      var d = parseInt(t.dataset.d,10);
      var mv = STATE.salaryMonthly[MONTHS[mi]];
      mv[field] = Math.max(0, (mv[field]||0) + d);
      save(); rerenderCurrent(); return;
    }
    if(action === 'add-offbudget'){
      var addOffMi = parseInt(t.dataset.mi,10);
      if(isNaN(addOffMi) || addOffMi<0 || addOffMi>11) return;
      STATE.offBudgetExpenses[addOffMi].push({id:uid(),ad:'Yeni Harcama',tutar:0});
      save(); rerenderCurrent(); return;
    }
    if(action === 'offbudget-del'){
      var delOffMi = parseInt(t.dataset.mi,10);
      var delOffList = STATE.offBudgetExpenses[delOffMi] || [];
      var delOffIndex = delOffList.findIndex(function(x){return x.id===t.dataset.id;});
      if(delOffIndex>-1){delOffList.splice(delOffIndex,1);save();rerenderCurrent();}
      return;
    }
    if(action === 'del'){
      var list = findList(t.dataset.list);
      if(t.dataset.list==='debts'){
        var transferExists = STATE.faturalar.some(function(f){
          return Object.keys(f.cardTransfers || {}).some(function(k){return f.cardTransfers[k] && f.cardTransfers[k].cardId===t.dataset.id;});
        });
        if(transferExists){ window.alert('Bu karta aktarılmış fatura var. Kartı silmeden önce ilgili fatura aktarımını geri alın.'); return; }
      }
      var i = list.findIndex(function(x){return x.id===t.dataset.id;});
      if(i>-1){ list.splice(i,1); save(); rerenderCurrent(); }
      return;
    }
    if(action === 'add-simple'){
      var list2 = findList(t.dataset.list);
      if(t.dataset.list==='faturalar') list2.push({id:uid(), ad:'Yeni Fatura', tutar:0, monthlyAmounts:MONTHS.map(function(){return 0;}), cardTransfers:{}});
      else list2.push({id:uid(), ad:'Yeni Kalem', tutar:0});
      save(); rerenderCurrent(); return;
    }
    if(action === 'add-ek'){
      STATE.ekBorclular.push({id:uid(), ad:'Yeni Kişi', baslangic:0, startMonthIndex:Math.max(0,current-1), payments:{}, balanceOverrides:{}, additions:{}, paidMonths:{}, missedMonths:{}, hidden:false, sortOrder:STATE.ekBorclular.length});
      save(); rerenderCurrent(); return;
    }
    if(action === 'transfer-bill'){
      var transferMi = parseInt(t.dataset.mi,10);
      var transferBill = STATE.faturalar.filter(function(x){return x.id===t.dataset.id;})[0];
      var cardSelect = document.getElementById('billCard_'+t.dataset.id+'_'+transferMi);
      var cardId = cardSelect ? cardSelect.value : '';
      var amount = transferBill ? billAmountForMonth(transferBill, transferMi) : 0;
      if(!cardId){ window.alert('Lütfen faturanın aktarılacağı kredi kartını seçin.'); return; }
      if(transferMi>=11){ window.alert('Temmuzdan sonra bu plan içinde bir sonraki ay bulunmuyor.'); return; }
      if(amount<=0){ window.alert('Aktarılacak fatura tutarı sıfırdan büyük olmalı.'); return; }
      var cardObj = STATE.debts.filter(function(x){return x.id===cardId;})[0];
      var confirmMsg = '"'+transferBill.ad+'" faturasının '+fmtShort(amount)+' tutarı bu ay için sıfırlanacak ve '+
        (cardObj?cardObj.ad:'seçilen kart')+'\'nın '+MONTHS[transferMi+1]+' ayı borcuna eklenecek. Onaylıyor musunuz?';
      if(!window.confirm(confirmMsg)) return;
      transferBill.cardTransfers = transferBill.cardTransfers || {};
      transferBill.cardTransfers[transferMi] = {cardId:cardId, amount:amount, targetMonth:transferMi+1};
      transferBill.monthlyAmounts[transferMi] = 0;
      save(); rerenderCurrent(); return;
    }
    if(action === 'undo-bill-transfer'){
      var undoMi = parseInt(t.dataset.mi,10);
      var undoBill = STATE.faturalar.filter(function(x){return x.id===t.dataset.id;})[0];
      var undoTransfer = undoBill && undoBill.cardTransfers ? undoBill.cardTransfers[undoMi] : null;
      if(undoBill && undoTransfer){
        undoBill.monthlyAmounts[undoMi] = Number(undoTransfer.amount || 0);
        delete undoBill.cardTransfers[undoMi];
        save(); rerenderCurrent();
      }
      return;
    }
    if(action === 'open-add-debt'){
      pendingAddDebtMonth = Math.max(0,current - 1);
      var slot = document.getElementById('addDebtSlot');
      if(slot){
        slot.innerHTML = addDebtFormHtml(pendingAddDebtMonth);
        var turSel = document.getElementById('ndTur');
        var kkRow = document.getElementById('ndKKRow');
        var kmhRow = document.getElementById('ndKMHRow');
        var krRow = document.getElementById('ndKrediRow');
        turSel.addEventListener('change', function(){
          kkRow.style.display = (turSel.value==='kredi_karti') ? 'flex' : 'none';
          kmhRow.style.display = (turSel.value==='kmh') ? 'flex' : 'none';
          krRow.style.display = (turSel.value==='kredi') ? 'flex' : 'none';
        });
        document.getElementById('ndCancel').addEventListener('click', function(){ slot.innerHTML=''; });
        document.getElementById('ndSave').addEventListener('click', function(){
          var ad = document.getElementById('ndAd').value.trim() || 'Yeni Borç';
          var tur = turSel.value;
          var baslangic = parseNum(document.getElementById('ndBaslangic').value);
          var startMonth = parseInt(document.getElementById('ndStartMonth').value,10);
          var nd = {id:uid(), ad:ad, tur:tur, baslangic:baslangic, startMonthIndex:isNaN(startMonth)?0:startMonth, payments:{}, balanceOverrides:{}, additions:{}, paidMonths:{}, missedMonths:{}, hidden:false, sortOrder:STATE.debts.length};
          if(tur==='kredi_karti'){
            nd.asgariYuzde = parseNum(document.getElementById('ndAsgari').value) || 20;
            nd.faizYuzde = parseNum(document.getElementById('ndFaiz').value) || 5;
          } else if(tur==='kmh'){
            nd.faizYuzde = parseNum(document.getElementById('ndKmhFaiz').value) || 5;
          } else if(tur==='kredi'){
            nd.taksit = parseNum(document.getElementById('ndTaksit').value) || baslangic;
          }
          STATE.debts.push(nd);
          save(); rerenderCurrent();
        });
      }
      return;
    }

    if(action === 'open-add-gold'){
      var goldSlot = document.getElementById('addGoldSlot');
      if(goldSlot){
        goldSlot.innerHTML = addGoldFormHtml();
        document.getElementById('ngCancel').addEventListener('click', function(){ goldSlot.innerHTML=''; });
        document.getElementById('ngSave').addEventListener('click', function(){
          var ayar = document.getElementById('ngAyar').value;
          var gram = parseNum(document.getElementById('ngGram').value);
          var ay = parseInt(document.getElementById('ngAy').value,10);
          if(gram<=0){ window.alert('Lütfen 0’dan büyük bir gram değeri girin.'); return; }
          STATE.gold[ayar].push({id:uid(), gram:gram, mi:isNaN(ay)?0:ay});
          save(); rerenderCurrent();
        });
      }
      return;
    }
  }

  document.getElementById('book').addEventListener('change', onChange);
  document.getElementById('book').addEventListener('click', onClick);

  // init
  buildTabs();
  baseLeaf.innerHTML = renderPage(0);
  updateIndicator();
})();

</script>

<script>
(function(){
  var installBtn = document.getElementById('installBtn');
  var deferredInstallPrompt = null;

  var bookEl = document.getElementById('book');
  var zoomOutBtn = document.getElementById('zoomOut');
  var zoomInBtn = document.getElementById('zoomIn');
  var ZOOM_KEY = 'birikimDefteri_zoom';
  var zoomLevel = parseFloat(localStorage.getItem(ZOOM_KEY)) || 1;
  function applyZoom(){
    if(bookEl) bookEl.style.zoom = zoomLevel;
  }
  applyZoom();

  try{
    if(window.matchMedia && window.matchMedia('(display-mode: standalone)').matches && screen.orientation && screen.orientation.lock){
      screen.orientation.lock('portrait').catch(function(){});
    }
  }catch(e){}

  if(zoomInBtn) zoomInBtn.addEventListener('click', function(){
    zoomLevel = Math.min(1.6, Math.round((zoomLevel + 0.1) * 100) / 100);
    localStorage.setItem(ZOOM_KEY, zoomLevel);
    applyZoom();
  });
  if(zoomOutBtn) zoomOutBtn.addEventListener('click', function(){
    zoomLevel = Math.max(0.8, Math.round((zoomLevel - 0.1) * 100) / 100);
    localStorage.setItem(ZOOM_KEY, zoomLevel);
    applyZoom();
  });

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(function(){});
  }

  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();
    deferredInstallPrompt = e;
    if(installBtn) installBtn.hidden = false;
  });

  if(installBtn){
    installBtn.addEventListener('click',function(){
      if(!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.then(function(){
        deferredInstallPrompt = null;
        installBtn.hidden = true;
      });
    });
  }

  window.addEventListener('appinstalled',function(){
    deferredInstallPrompt = null;
    if(installBtn) installBtn.hidden = true;
  });
})();
</script>

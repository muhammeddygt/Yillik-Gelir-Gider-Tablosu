<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yıllık Gelir Gider Tablosu</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" import="#1e293b">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #1e293b; border-radius: 12px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { font-size: 1.8rem; color: #38bdf8; margin-bottom: 20px; text-align: center; }
        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card { background: #334155; padding: 16px; border-radius: 8px; border-left: 4px solid #38bdf8; }
        .card.income { border-left-color: #4ade80; }
        .card.expense { border-left-color: #f87171; }
        .card h3 { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; }
        .card p { font-size: 1.4rem; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { background-color: #0f172a; color: #38bdf8; }
        tr:hover { background-color: #273549; }
        .badge-income { color: #4ade80; font-weight: bold; }
        .badge-expense { color: #f87171; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Yıllık Gelir Gider Tablosu</h1>
        <div class="summary-cards">
            <div class="card income">
                <h3>Toplam Gelir</h3>
                <p id="total-income">₺0.00</p>
            </div>
            <div class="card expense">
                <h3>Toplam Gider</h3>
                <p id="total-expense">₺0.00</p>
            </div>
            <div class="card">
                <h3>Net Bakiye</h3>
                <p id="net-balance">₺0.00</p>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Tarih</th>
                    <th>Açıklama</th>
                    <th>Kategori</th>
                    <th>Tutar</th>
                </tr>
            </thead>
            <tbody id="data-table">
                <!-- Veriler buraya eklenecek -->
            </tbody>
        </table>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
